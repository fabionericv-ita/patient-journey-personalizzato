version: '3.8'

services:
  # Database PostgreSql per i dati clinici
  db:
    image: postgres:15-alpine
    container_name: patient-db
    restart: always
    environment:
      - POSTGRES_DB=patient_journey_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend Java Spring Boot
  backend:
    build: ./Backend
    container_name: patient-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/patient_journey_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true

  # Frontend React
  frontend:
    build: ./Frontend
    container_name: patient-frontend
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data: